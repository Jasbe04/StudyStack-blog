<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudyStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border: none;
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #212529;
            text-align: center;
            margin-bottom: 1.5rem;
            text-decoration: none;
            display: block;
        }

        .btn-warning {
            background-color: #ffc107;
            border: none;
            font-weight: 700;
            padding: 0.8rem;
            width: 100%;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-warning:hover {
            background-color: #e5ac00;
            transform: translateY(-1px);
        }

        .form-control {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
            border-color: #ffc107;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
        }

        .register-link a {
            color: #ffc107;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <a href="/" class="brand-logo">
        <i class="fa fa-code text-warning"></i> StudyStack
    </a>

    <h4 class="text-center fw-bold mb-4">Welcome Back</h4>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        
        {% if form %}
            <div class="mb-3">
                {{ form.username.label_tag }}
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                {{ form.password.label_tag }}
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
        {% endif %}

        <div class="d-flex justify-content-between mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label small" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="small text-muted text-decoration-none">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-warning shadow-sm">
            Login <i class="fa fa-arrow-right ms-2"></i>
        </button>
    </form>

    <div class="register-link">
        <p class="mb-0">Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
