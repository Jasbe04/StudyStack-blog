<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register | StudyStack</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <style>
            body {
                background-color: #f4f7f6;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Inter', -apple-system, sans-serif;
                padding: 40px 15px;
            }

            .register-card {
                width: 100%;
                max-width: 450px;
                padding: 2.5rem;
                border: none;
                border-radius: 15px;
                background: #ffffff;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            }

            .brand-logo {
                font-size: 2rem;
                font-weight: 800;
                color: #212529;
                text-align: center;
                margin-bottom: 1.5rem;
                text-decoration: none;
                display: block;
            }

            .btn-warning {
                background-color: #ffc107;
                border: none;
                font-weight: 700;
                padding: 0.8rem;
                width: 100%;
                border-radius: 8px;
                transition: all 0.3s ease;
            }

            .btn-warning:hover {
                background-color: #e5ac00;
                transform: translateY(-1px);
            }

            .form-control {
                padding: 0.8rem;
                border-radius: 8px;
                border: 1px solid #dee2e6;
            }

            .form-control:focus {
                box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
                border-color: #ffc107;
            }

            .login-link {
                text-align: center;
                margin-top: 1.5rem;
                color: #6c757d;
            }

            .login-link a {
                color: #ffc107;
                text-decoration: none;
                font-weight: 600;
            }

            .login-link a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>

        <div class="register-card">

            <a href="/" class="brand-logo">
                <i class="fa fa-book-open text-warning"></i> StudyStack
            </a>

            <h4 class="text-center fw-bold mb-4">Create Your Account</h4>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    {{ form.email }}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    {{ form.password1 }}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    {{ form.password2 }}
                </div>

                <button type="submit" class="btn btn-warning shadow-sm">
                    Join StudyStack <i class="fa fa-user-plus ms-2"></i>
                </button>

            </form>

            <div class="login-link">
                <p class="mb-0">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
            </div>

        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
